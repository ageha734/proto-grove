name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip release]')"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: bump
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

          COMMITS=$(git log "${LATEST_TAG}..HEAD" --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")

          BUMP="none"
          if echo "$COMMITS" | grep -qE '^(feat|refactor)!:|BREAKING CHANGE'; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE '^feat(\(.+\))?:'; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -qE '^fix(\(.+\))?:|^chore(\(.+\))?:|^perf(\(.+\))?:'; then
            BUMP="patch"
          fi

          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"

          if [ "$BUMP" = "none" ]; then
            echo "No release-worthy commits found"
            exit 0
          fi

          VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing $NEW_VERSION ($BUMP bump from $LATEST_TAG)"

      - name: Create tag and release
        if: steps.bump.outputs.bump != 'none' && steps.bump.outputs.new_version != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "$NEW_VERSION" -m "Release $NEW_VERSION"
          git push origin "$NEW_VERSION"

          gh release create "$NEW_VERSION" \
            --generate-notes \
            --title "$NEW_VERSION"

      - name: Update major version tag
        if: steps.bump.outputs.bump != 'none' && steps.bump.outputs.new_version != ''
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          MAJOR=$(echo "$NEW_VERSION" | cut -d. -f1)
          git tag -f "$MAJOR"
          git push -f origin "$MAJOR"

      - name: Log in to GHCR
        if: steps.bump.outputs.bump != 'none' && steps.bump.outputs.new_version != ''
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.bump.outputs.bump != 'none' && steps.bump.outputs.new_version != ''
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Build and push Docker image
        if: steps.bump.outputs.bump != 'none' && steps.bump.outputs.new_version != ''
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.bump.outputs.new_version }}
            ghcr.io/${{ github.repository }}:latest
